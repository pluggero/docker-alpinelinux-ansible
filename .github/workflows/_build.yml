---
name: Build

on:
  workflow_call:
    inputs:
      upload-artifact:
        description: "Whether to upload the built artifact"
        type: boolean
        default: false
    outputs:
      artifact-name:
        description: "The name of the uploaded artifact"
        value: docker-image

env:
  PACKER_OUTPUT: packer/outputs/alpinelinux-ansible.tar

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python 3
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Setup Packer
        uses: hashicorp/setup-packer@ce93c3c08a6c2ff2275bf4b54ff0d9a75f6c9789 # v3

      - name: Verify Packer installation
        run: packer --version

      - name: Make builder script executable
        run: chmod +x ./scripts/alpinelinux_builder.sh

      - name: Build the Docker image
        run: ./scripts/alpinelinux_builder.sh

      - name: Verify image file created
        run: |
          if [ ! -f "${{ env.PACKER_OUTPUT }}" ]; then
            echo "Image file not found!"
            exit 1
          fi
          echo "Image file found: ${{ env.PACKER_OUTPUT }}"

      - name: Upload image artifact
        if: inputs.upload-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docker-image
          path: ${{ env.PACKER_OUTPUT }}
          retention-days: 1
